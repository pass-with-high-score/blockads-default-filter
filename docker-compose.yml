services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blockads
      POSTGRES_PASSWORD: blockads
      POSTGRES_DB: blockads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockads -d blockads"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PORT=8080
      - ENVIRONMENT=production
      - DATABASE_URL=postgres://blockads:blockads@postgres:5432/blockads?sslmode=disable
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-blockads-filters}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}

volumes:
  pgdata:
